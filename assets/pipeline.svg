<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Pipeline: input to Claude Code to pipeline to output">
  <defs>
    <linearGradient id="gInput" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gClaude" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="gPipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="gOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect x="6" y="6" width="988" height="288" rx="26" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="500" y="40" text-anchor="middle" fill="#8b949e" font-size="12" letter-spacing="4" font-weight="700">H O W&#160;&#160;I T&#160;&#160;F L O W S</text>

  <!-- arrows -->
  <g fill="url(#gArrow)" filter="url(#glow)">
    <polygon points="240,150 262,162 240,174"/>
    <polygon points="488,150 510,162 488,174"/>
    <polygon points="736,150 758,162 736,174"/>
  </g>

  <!-- card: INPUT -->
  <g filter="url(#shadow)">
    <rect x="30" y="85" width="196" height="150" rx="18" fill="url(#gInput)"/>
  </g>
  <text x="128" y="128" text-anchor="middle" font-size="34">📰</text>
  <text x="128" y="160" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800" letter-spacing="2">INPUT</text>
  <text x="128" y="188" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="ui-monospace, Menlo, monospace">url  ·  .txt</text>

  <!-- card: CLAUDE CODE -->
  <g filter="url(#shadow)">
    <rect x="277" y="85" width="196" height="150" rx="18" fill="url(#gClaude)"/>
  </g>
  <text x="375" y="128" text-anchor="middle" font-size="34">🤖</text>
  <text x="375" y="160" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800" letter-spacing="1.5">CLAUDE CODE</text>
  <text x="375" y="186" text-anchor="middle" fill="#eef2ff" font-size="12" font-family="ui-monospace, Menlo, monospace">/create-template-video</text>
  <text x="375" y="206" text-anchor="middle" fill="#c7d2fe" font-size="11">script + templates</text>

  <!-- card: PIPELINE -->
  <g filter="url(#shadow)">
    <rect x="524" y="85" width="196" height="150" rx="18" fill="url(#gPipe)"/>
  </g>
  <text x="622" y="126" text-anchor="middle" font-size="32">⚙️</text>
  <text x="622" y="156" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800" letter-spacing="1.5">PIPELINE</text>
  <text x="622" y="180" text-anchor="middle" fill="#fff1f2" font-size="12" font-family="ui-monospace, Menlo, monospace">npm run pipeline</text>
  <text x="622" y="200" text-anchor="middle" fill="#ffe4e6" font-size="10.5">OmniVoice · SFX</text>
  <text x="622" y="216" text-anchor="middle" fill="#ffe4e6" font-size="10.5">HyperFrames · FFmpeg</text>

  <!-- card: OUTPUT -->
  <g filter="url(#shadow)">
    <rect x="771" y="85" width="196" height="150" rx="18" fill="url(#gOut)"/>
  </g>
  <text x="869" y="126" text-anchor="middle" font-size="32">🎬</text>
  <text x="869" y="156" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800" letter-spacing="2">OUTPUT</text>
  <text x="869" y="182" text-anchor="middle" fill="#ecfdf5" font-size="13" font-weight="700" font-family="ui-monospace, Menlo, monospace">video.mp4</text>
  <text x="869" y="202" text-anchor="middle" fill="#d1fae5" font-size="10.5" font-family="ui-monospace, Menlo, monospace">voice.mp3 · script.txt</text>

  <!-- footer tag -->
  <text x="500" y="272" text-anchor="middle" fill="#6e7681" font-size="11">9:16 · 1080×1920 · deterministic renders</text>
</svg>
