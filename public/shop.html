<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Sản phẩm gợi ý</title>
<style>
  :root {
    --bg: #0a0d14;
    --panel: #131a26;
    --panel-2: #182030;
    --line: rgba(148, 163, 184, 0.16);
    --text: #f8fafc;
    --muted: #9aa7b8;
    --purple: #7c3aed;
    --purple-2: #a855f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(900px 400px at 50% -80px, rgba(124, 58, 237, 0.28), transparent 70%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    padding-bottom: 48px;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 14px 0;
  }
  #menuButton {
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
  }
  header {
    text-align: center;
    padding: 12px 16px 18px;
    flex: 1;
  }
  header .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--purple-2);
    background: rgba(124, 58, 237, 0.14);
    border: 1px solid rgba(124, 58, 237, 0.35);
    border-radius: 999px;
    padding: 4px 12px;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 22px;
    margin: 0 0 6px;
    font-weight: 700;
  }
  header p {
    color: var(--muted);
    font-size: 13px;
    margin: 0 auto;
    max-width: 380px;
    line-height: 1.5;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 14px;
  }
  #activeCategoryRow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--muted);
  }
  #activeCategoryRow strong { color: var(--text); }
  #searchBox {
    width: 100%;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 15px;
    margin-bottom: 18px;
    outline: none;
  }
  #searchBox:focus { border-color: rgba(168, 85, 247, 0.6); }
  #list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 480px) {
    #list { grid-template-columns: 1fr 1fr; }
  }
  .card {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--panel);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
  }
  .card .thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    background: var(--panel-2);
  }
  .card .thumb-placeholder {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e293b, #581c87);
    font-size: 34px;
  }
  .card .body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .card h3 {
    margin: 0 0 6px;
    font-size: 15px;
    line-height: 1.35;
  }
  .card p.points {
    margin: 0 0 10px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .price {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .card a.btn {
    margin-top: auto;
    display: block;
    text-align: center;
    padding: 11px;
    border-radius: 9px;
    background: linear-gradient(135deg, #5b21b6, #7c3aed);
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 13.5px;
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 50px 10px;
    font-size: 14px;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 30px;
    opacity: 0.6;
  }

  /* Category drawer */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 20;
    display: none;
  }
  #overlay.show { display: block; }
  #drawer {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 260px;
    max-width: 78vw;
    background: var(--panel);
    border-right: 1px solid var(--line);
    z-index: 21;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    display: flex;
    flex-direction: column;
  }
  #drawer.show { transform: translateX(0); }
  #drawer .drawer-head {
    padding: 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #drawer .drawer-head h2 { font-size: 15px; margin: 0; }
  #drawer .drawer-head button {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
  }
  #categoryList {
    overflow-y: auto;
    padding: 8px;
  }
  #categoryList button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 11px 12px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 2px;
  }
  #categoryList button.active {
    background: rgba(124, 58, 237, 0.18);
    color: var(--purple-2);
    font-weight: 600;
  }
  #categoryList button .count {
    color: var(--muted);
    font-size: 12px;
    float: right;
  }
</style>
</head>
<body>
  <div class="topbar">
    <button id="menuButton" aria-label="Danh mục">☰</button>
    <header>
      <span class="badge">🛍️ Ưu đãi hôm nay</span>
      <h1>Sản phẩm gợi ý</h1>
      <p>Bấm ☰ để chọn danh mục, hoặc gõ tên sản phẩm để tìm nhanh.</p>
    </header>
  </div>
  <main>
    <div id="activeCategoryRow">Đang xem: <strong id="activeCategoryLabel">Tất cả</strong></div>
    <input id="searchBox" type="search" placeholder="🔍 Tìm theo tên sản phẩm..." />
    <div id="list"><div class="empty">Đang tải...</div></div>
    <footer>Giá và ưu đãi thật vui lòng xem trực tiếp trên Shopee.</footer>
  </main>

  <div id="overlay"></div>
  <div id="drawer">
    <div class="drawer-head"><h2>Danh mục</h2><button id="closeDrawerButton" aria-label="Đóng">✕</button></div>
    <div id="categoryList"></div>
  </div>

  <script>
    let allProducts = [];
    let activeCategory = "Tất cả";

    function applyFilters() {
      const q = document.getElementById("searchBox").value.trim().toLowerCase();
      let filtered = allProducts;
      if (activeCategory !== "Tất cả") {
        filtered = filtered.filter((p) => (p.category || "Khác") === activeCategory);
      }
      if (q) {
        filtered = filtered.filter((p) => (p.product_name || "").toLowerCase().includes(q));
      }
      renderList(filtered);
    }

    function renderCategoryDrawer() {
      const counts = new Map();
      allProducts.forEach((p) => {
        const cat = p.category || "Khác";
        counts.set(cat, (counts.get(cat) || 0) + 1);
      });
      const cats = ["Tất cả", ...Array.from(counts.keys()).sort()];
      const list = document.getElementById("categoryList");
      list.innerHTML = cats.map((cat) => `
        <button data-cat="${escapeAttr(cat)}" class="${cat === activeCategory ? "active" : ""}">
          ${escapeHtml(cat)}<span class="count">${cat === "Tất cả" ? allProducts.length : counts.get(cat)}</span>
        </button>
      `).join("");
      list.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeCategory = btn.dataset.cat;
          document.getElementById("activeCategoryLabel").textContent = activeCategory;
          closeDrawer();
          renderCategoryDrawer();
          applyFilters();
        });
      });
    }

    function openDrawer() {
      document.getElementById("drawer").classList.add("show");
      document.getElementById("overlay").classList.add("show");
    }
    function closeDrawer() {
      document.getElementById("drawer").classList.remove("show");
      document.getElementById("overlay").classList.remove("show");
    }
    document.getElementById("menuButton").addEventListener("click", openDrawer);
    document.getElementById("closeDrawerButton").addEventListener("click", closeDrawer);
    document.getElementById("overlay").addEventListener("click", closeDrawer);

    function renderList(products) {
      const list = document.getElementById("list");
      if (!products.length) {
        list.innerHTML = '<div class="empty">Không tìm thấy sản phẩm phù hợp.</div>';
        return;
      }
      list.innerHTML = products.map((p) => `
        <div class="card">
          ${p.image_url
            ? `<img class="thumb" src="${escapeAttr(p.image_url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>🛍️</div>';" />`
            : `<div class="thumb-placeholder">🛍️</div>`}
          <div class="body">
            <h3>${escapeHtml(p.product_name || "")}</h3>
            ${p.key_points ? `<p class="points">${escapeHtml(p.key_points)}</p>` : ""}
            ${p.price_reference ? `<div class="price">Giá tham khảo: ${escapeHtml(p.price_reference)} (xem giá thật trên Shopee)</div>` : ""}
            <a class="btn" href="#" data-id="${p.id}" data-url="${escapeAttr(p.affiliate_url || "")}">Xem trên Shopee</a>
          </div>
        </div>
      `).join("");
      list.querySelectorAll("a.btn").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.preventDefault();
          const id = btn.dataset.id;
          const url = btn.dataset.url;
          fetch(`/api/public/products/${id}/click`, { method: "POST" }).catch(() => {});
          if (url) window.open(url, "_blank");
        });
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function escapeAttr(str) {
      return escapeHtml(str);
    }

    document.getElementById("searchBox").addEventListener("input", applyFilters);

    fetch("/api/public/products")
      .then((r) => r.json())
      .then((data) => {
        allProducts = data.products || [];
        renderCategoryDrawer();
        applyFilters();
      })
      .catch(() => {
        document.getElementById("list").innerHTML = '<div class="empty">Không tải được danh sách, thử lại sau.</div>';
      });
  </script>
</body>
</html>
