<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Sản phẩm gợi ý</title>
<style>
  :root {
    --bg: #0a0d14;
    --panel: #131a26;
    --panel-2: #182030;
    --line: rgba(148, 163, 184, 0.16);
    --text: #f8fafc;
    --muted: #9aa7b8;
    --purple: #7c3aed;
    --purple-2: #a855f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(900px 400px at 50% -80px, rgba(124, 58, 237, 0.28), transparent 70%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    padding-bottom: 48px;
  }
  header {
    text-align: center;
    padding: 28px 16px 18px;
  }
  header .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--purple-2);
    background: rgba(124, 58, 237, 0.14);
    border: 1px solid rgba(124, 58, 237, 0.35);
    border-radius: 999px;
    padding: 4px 12px;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 22px;
    margin: 0 0 6px;
    font-weight: 700;
  }
  header p {
    color: var(--muted);
    font-size: 13px;
    margin: 0 auto;
    max-width: 380px;
    line-height: 1.5;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 14px;
  }
  #searchBox {
    width: 100%;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 15px;
    margin-bottom: 18px;
    outline: none;
  }
  #searchBox:focus { border-color: rgba(168, 85, 247, 0.6); }
  #list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 480px) {
    #list { grid-template-columns: 1fr 1fr; }
  }
  .card {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--panel);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
  }
  .card .thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    background: var(--panel-2);
  }
  .card .thumb-placeholder {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e293b, #581c87);
    font-size: 34px;
  }
  .card .body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .card .code {
    display: inline-block;
    align-self: flex-start;
    font-size: 11px;
    color: var(--purple-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px 8px;
    margin-bottom: 8px;
  }
  .card h3 {
    margin: 0 0 6px;
    font-size: 15px;
    line-height: 1.35;
  }
  .card p.points {
    margin: 0 0 10px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .price {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .card a.btn {
    margin-top: auto;
    display: block;
    text-align: center;
    padding: 11px;
    border-radius: 9px;
    background: linear-gradient(135deg, #5b21b6, #7c3aed);
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 13.5px;
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 50px 10px;
    font-size: 14px;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 30px;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <header>
    <span class="badge">🛍️ Ưu đãi hôm nay</span>
    <h1>Sản phẩm gợi ý</h1>
    <p>Nhập mã sản phẩm ghi trong video (VD: SP0001) để tìm nhanh, hoặc lướt danh sách bên dưới.</p>
  </header>
  <main>
    <input id="searchBox" type="search" placeholder="🔍 Tìm theo mã sản phẩm hoặc tên..." />
    <div id="list"><div class="empty">Đang tải...</div></div>
    <footer>Link Affiliate — giá và ưu đãi thật vui lòng xem trực tiếp trên Shopee.</footer>
  </main>

  <script>
    let allProducts = [];

    function render(products) {
      const list = document.getElementById("list");
      if (!products.length) {
        list.innerHTML = '<div class="empty">Không tìm thấy sản phẩm phù hợp.</div>';
        return;
      }
      list.innerHTML = products.map((p) => `
        <div class="card">
          ${p.image_url
            ? `<img class="thumb" src="${escapeAttr(p.image_url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>🛍️</div>';" />`
            : `<div class="thumb-placeholder">🛍️</div>`}
          <div class="body">
            <span class="code">${escapeHtml(p.item_id || "")}</span>
            <h3>${escapeHtml(p.product_name || "")}</h3>
            ${p.key_points ? `<p class="points">${escapeHtml(p.key_points)}</p>` : ""}
            ${p.price_reference ? `<div class="price">Giá tham khảo: ${escapeHtml(p.price_reference)} (xem giá thật trên Shopee)</div>` : ""}
            <a class="btn" href="#" data-id="${p.id}" data-url="${escapeAttr(p.affiliate_url || "")}">Xem trên Shopee</a>
          </div>
        </div>
      `).join("");
      list.querySelectorAll("a.btn").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.preventDefault();
          const id = btn.dataset.id;
          const url = btn.dataset.url;
          fetch(`/api/public/products/${id}/click`, { method: "POST" }).catch(() => {});
          if (url) window.open(url, "_blank");
        });
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function escapeAttr(str) {
      return escapeHtml(str);
    }

    document.getElementById("searchBox").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) { render(allProducts); return; }
      render(allProducts.filter((p) =>
        (p.item_id || "").toLowerCase().includes(q) || (p.product_name || "").toLowerCase().includes(q)
      ));
    });

    fetch("/api/public/products")
      .then((r) => r.json())
      .then((data) => {
        allProducts = data.products || [];
        render(allProducts);
      })
      .catch(() => {
        document.getElementById("list").innerHTML = '<div class="empty">Không tải được danh sách, thử lại sau.</div>';
      });
  </script>
</body>
</html>
