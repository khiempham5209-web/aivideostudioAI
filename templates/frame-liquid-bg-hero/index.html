<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1920, height=1080" />
        <title>Liquid Hero · 16:9</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700;800;900&display=swap"
            rel="stylesheet"
        />
        <style>
            /*
   * frame-liquid-bg-hero — "Aurora Violet" liquid background hero. Vendored from
   * nexu-io/html-video (Apache-2.0), adapted to HyperFrames 0.6 (Tailwind CDN →
   * plain CSS, Noto Sans SC dropped, blend-difference text → solid white+shadow,
   * slots via variables, staggered reveal). Floating blurred blobs kept.
   * Inter Tight covers Vietnamese. See NOTICE. Landscape 16:9; 9:16 portrait at
   * compositions/portrait.html.
   */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1920px;
                height: 1080px;
                overflow: hidden;
            }
            #root {
                position: relative;
                width: 1920px;
                height: 1080px;
                overflow: hidden;
                background: #1e1b4b;
                color: #fafaf8;
                font-family: "Inter Tight", system-ui, sans-serif;
            }

            .blob {
                position: absolute;
                border-radius: 50%;
                mix-blend-mode: screen;
                filter: blur(75px);
                will-change: transform;
                z-index: 0;
            }
            @keyframes float1 {
                0%,
                100% {
                    transform: translate(0, 0) scale(1);
                }
                50% {
                    transform: translate(80px, -60px) scale(1.15);
                }
            }
            @keyframes float2 {
                0%,
                100% {
                    transform: translate(0, 0) scale(1.1);
                }
                50% {
                    transform: translate(-100px, 40px) scale(0.9);
                }
            }
            @keyframes float3 {
                0%,
                100% {
                    transform: translate(0, 0) scale(0.95);
                }
                50% {
                    transform: translate(50px, 80px) scale(1.2);
                }
            }
            .b1 {
                width: 600px;
                height: 600px;
                background: #a78bfa;
                top: -120px;
                left: -100px;
                animation: float1 12s ease-in-out infinite;
            }
            .b2 {
                width: 520px;
                height: 520px;
                background: #7c5cff;
                top: 28%;
                right: -120px;
                animation: float2 10s ease-in-out infinite;
            }
            .b3 {
                width: 480px;
                height: 480px;
                background: #ec4899;
                bottom: -140px;
                left: 32%;
                animation: float3 14s ease-in-out infinite;
            }
            .b4 {
                width: 380px;
                height: 380px;
                background: #06b6d4;
                top: 58%;
                left: 12%;
                animation: float1 16s ease-in-out infinite;
                opacity: 0.6;
            }

            .grid-bg {
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 1;
                background-image:
                    linear-gradient(
                        rgba(255, 255, 255, 0.04) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.04) 1px,
                        transparent 1px
                    );
                background-size: 64px 64px;
            }

            /* soft dark scrim behind the title so the gradient headline
               (incl. its purple end) keeps full contrast over the blobs */
            .scrim {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 1500px;
                height: 760px;
                z-index: 3;
                pointer-events: none;
                background: radial-gradient(
                    ellipse at center,
                    rgba(18, 14, 46, 0.66) 0%,
                    rgba(18, 14, 46, 0.5) 44%,
                    rgba(18, 14, 46, 0) 72%
                );
                filter: blur(24px);
            }

            .chip {
                position: absolute;
                left: 90px;
                right: 90px;
                display: flex;
                justify-content: space-between;
                font-size: 19px;
                letter-spacing: 4px;
                text-transform: uppercase;
                opacity: 0.7;
                z-index: 5;
                font-weight: 500;
                text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            }
            .chip.top {
                top: 70px;
            }
            .chip.bot {
                bottom: 70px;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(28px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .main {
                position: absolute;
                left: 120px;
                right: 120px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 10;
                text-align: center;
            }
            .headline {
                font-weight: 900;
                letter-spacing: -3px;
                line-height: 1.12;
                font-size: 165px;
                background-image: linear-gradient(
                    125deg,
                    #ffd66b 0%,
                    #ff9a3d 32%,
                    #ff5db1 64%,
                    #9b6bff 100%
                );
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                filter: drop-shadow(0 6px 34px rgba(0, 0, 0, 0.5));
                max-width: 1400px;
                margin: 0 auto;
                opacity: 0;
                animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
            }
            .subheadline {
                margin-top: 34px;
                font-size: 36px;
                font-weight: 500;
                line-height: 1.4;
                opacity: 0.88;
                max-width: 1100px;
                margin-left: auto;
                margin-right: auto;
                text-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
                animation: fadeUp 0.8s ease-out 0.75s both;
            }
            .cta {
                display: inline-flex;
                align-items: center;
                gap: 14px;
                margin-top: 52px;
                font-size: 26px;
                font-weight: 700;
                letter-spacing: 1px;
                padding: 18px 44px;
                border-radius: 999px;
                border: 2px solid rgba(255, 255, 255, 0.55);
                background: rgba(255, 255, 255, 0.08);
                text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
                opacity: 0;
                animation: fadeUp 0.7s ease-out 1.1s both;
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1920"
            data-height="1080"
            data-composition-variables='{"kicker":"AI Coding","brand":"https://aicodingvn.vercel.app/","headline":"GPT 5.5 ra mắt","subheadline":"Mô hình AI mạnh nhất từ trước tới nay vừa được công bố.","cta":"Theo dõi ngay"}'
        >
            <div class="blob b1"></div>
            <div class="blob b2"></div>
            <div class="blob b3"></div>
            <div class="blob b4"></div>
            <div class="grid-bg"></div>
            <div class="scrim"></div>

            <div class="chip top">
                <span class="kicker"></span><span>16:9</span>
            </div>

            <div class="main">
                <h1 class="headline"></h1>
                <p class="subheadline"></p>
                <div class="cta"></div>
            </div>

            <div class="chip bot">
                <span class="brand"></span><span>Bản tin</span>
            </div>
        </div>

        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".kicker", v.kicker);
                set(".brand", v.brand);
                set(".headline", v.headline);
                set(".subheadline", v.subheadline);
                set(".cta", v.cta);
                if (v.headline_from && v.headline_to) {
                    var hl = document.querySelector(".headline");
                    if (hl)
                        hl.style.backgroundImage =
                            "linear-gradient(125deg, " +
                            v.headline_from +
                            " 0%, " +
                            v.headline_to +
                            " 100%)";
                }

                /* Scale down only if a single word is wider than the container */
                var hlEl = document.querySelector(".headline");
                if (hlEl && hlEl.textContent.trim()) {
                    var maxPx = 168, minPx = 60;
                    hlEl.style.fontSize = maxPx + "px";
                    var avail = hlEl.offsetWidth;
                    var probe = document.createElement("span");
                    probe.style.cssText = "position:absolute;visibility:hidden;white-space:nowrap;" +
                        "font-size:" + maxPx + "px;font-weight:900;" +
                        "font-family:'Inter Tight',system-ui,sans-serif;letter-spacing:-3px;";
                    document.body.appendChild(probe);
                    var maxWordW = 0;
                    hlEl.textContent.trim().split(/\s+/).forEach(function (w) {
                        probe.textContent = w;
                        if (probe.scrollWidth > maxWordW) maxWordW = probe.scrollWidth;
                    });
                    document.body.removeChild(probe);
                    if (maxWordW > avail) {
                        hlEl.style.fontSize = Math.max(minPx, Math.floor(maxPx * avail / maxWordW)) + "px";
                    }
                }
            })();
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function () {},
                paused: function () {
                    return true;
                },
            };
        </script>
    </body>
</html>
