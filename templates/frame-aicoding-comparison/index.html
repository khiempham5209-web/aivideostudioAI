<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>AI Coding Comparison · 16:9</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /*
   * frame-aicoding-comparison — original template for this repo. Dark "head to
   * head" comparison (teal glow, pill badge, "X vs Y" two-gradient headline, two
   * framed cards + optional WIN badge + stat row). Gradient colours + icons are
   * caller-chosen. Be Vietnam Pro covers Vietnamese. See NOTICE. Landscape 16:9;
   * 9:16 at compositions/portrait.html.
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  #root { position: relative; width: 1920px; height: 1080px; background: #070d12; color: #eef3f4;
    font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center; }

  .bg { position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(1000px 760px at 16% 8%, rgba(34,224,192,0.15) 0%, transparent 52%),
      radial-gradient(820px 700px at 88% 14%, rgba(56,120,255,0.10) 0%, transparent 55%),
      radial-gradient(1200px 900px at 50% 112%, rgba(20,90,90,0.12) 0%, transparent 60%); }
  .grid { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.45;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px; mask-image: radial-gradient(circle at 50% 45%, #000 0%, transparent 80%); }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }

  .grad { -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stack { position: relative; z-index: 4; width: 1320px; display: flex; flex-direction: column; align-items: center; }

  .badge { padding: 13px 32px; border-radius: 999px; font-size: 22px; font-weight: 700; letter-spacing: 5px;
    text-transform: uppercase; color: #7fe9d6; border: 1.5px solid rgba(52,224,192,0.5);
    background: rgba(52,224,192,0.08); opacity: 0; animation: fadeDown 0.7s ease-out 0.15s both; }
  .headline { margin-top: 30px; font-size: 72px; font-weight: 800; letter-spacing: -1px; text-align: center; line-height: 1.1;
    opacity: 0; animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) 0.35s both; }
  .headline .vs { color: rgba(238,243,244,0.5); font-weight: 600; margin: 0 12px; }
  .headline .pre, .headline .post { color: #eef3f4; }

  .cards { margin-top: 46px; display: flex; gap: 32px; width: 100%; }
  .card { position: relative; flex: 1 1 0; min-width: 0; border-radius: 28px; padding: 48px 44px 44px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05); text-align: center;
    opacity: 0; transform: translateY(26px); animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }
  .card.left { animation-delay: 0.6s; }
  .card.right { animation-delay: 0.74s; }
  .card.is-win { border-color: rgba(52,224,192,0.5); box-shadow: 0 24px 70px rgba(52,224,192,0.18), inset 0 1px 0 rgba(255,255,255,0.06); }
  .card .ic { font-size: 48px; margin-bottom: 12px; line-height: 1; }
  .card .lbl { font-size: 96px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
  .card .bullets { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }
  .card .bz { font-size: 25px; font-weight: 500; color: rgba(238,243,244,0.62); line-height: 1.35; }
  .win { position: absolute; top: 20px; right: 20px; padding: 7px 18px; border-radius: 999px; font-size: 19px;
    font-weight: 800; letter-spacing: 2px; color: #06241d; background: linear-gradient(92deg, #34e0c0, #22d3ee);
    box-shadow: 0 6px 24px rgba(52,224,192,0.4); opacity: 0; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.1s both; }

  .stats { margin-top: 26px; display: flex; gap: 32px; width: 100%; }
  .stat { flex: 1 1 0; border-radius: 22px; padding: 26px 24px; text-align: center;
    background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08);
    opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease-out both; }
  .stat.left { animation-delay: 0.95s; }
  .stat.right { animation-delay: 1.05s; }
  .stat .sv { font-size: 52px; font-weight: 800; line-height: 1; }
  .stat .sl { margin-top: 6px; font-size: 22px; font-weight: 500; color: rgba(238,243,244,0.5); }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="5"
    data-width="1920"
    data-height="1080"
    data-composition-variables='{"badge":"Đối đầu","pre":"Truyền thống","vs":"vs","post":"học tập","left":{"label":"LMS","from":"#ffb020","to":"#ff7a3d","bullets":["Khoá cố định / lộ trình tuyến tính","Một kiểu cho tất cả / tiếp thu thụ động"],"stat":"88%","stat_label":"Ưa nền tảng mới"},"right":{"label":"AI","from":"#34e0c0","to":"#22d3ee","win":true,"bullets":["Hỏi tức thì / đào sâu theo nhu cầu","Cá nhân hoá / chủ động khám phá"],"stat":"42%","stat_label":"Đang chuyển đổi"}}'
  >
    <div class="bg"></div>
    <div class="grid"></div>

    <div class="stack">
      <div class="badge"></div>
      <h1 class="headline"></h1>
      <div class="cards">
        <div class="card left"></div>
        <div class="card right"></div>
      </div>
      <div class="stats"></div>
    </div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes &&
               typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      var L = v.left || {}, R = v.right || {};
      var LF = L.from || "#ffb020", LT = L.to || "#ff7a3d";
      var RF = R.from || "#34e0c0", RT = R.to || "#22d3ee";
      var gradStyle = function (el, from, to) { el.style.backgroundImage = "linear-gradient(92deg, " + from + " 0%, " + to + " 100%)"; };
      var setText = function (sel, text) { var el = document.querySelector(sel); if (el && text != null) el.textContent = String(text); };
      var fitLbl = function (el, maxPx, minPx) {
        if (!el || !el.textContent.trim()) return;
        el.style.whiteSpace = "nowrap";
        el.style.fontSize = maxPx + "px";
        if (el.scrollWidth > el.offsetWidth) {
          var sized = Math.max(minPx || 36, Math.floor(maxPx * el.offsetWidth / el.scrollWidth));
          el.style.fontSize = sized + "px";
        }
        el.style.whiteSpace = "";
      };

      setText(".badge", v.badge);

      var h = document.querySelector(".headline");
      if (h) {
        h.textContent = "";
        var addPlain = function (t, cls) { if (!t) return; var sp = document.createElement("span"); sp.className = cls; sp.textContent = " " + t + " "; h.appendChild(sp); };
        var addGrad = function (t, from, to) { var sp = document.createElement("span"); sp.className = "grad"; sp.textContent = t; gradStyle(sp, from, to); h.appendChild(sp); };
        addPlain(v.pre, "pre");
        if (L.label) addGrad(String(L.label), LF, LT);
        var vs = document.createElement("span"); vs.className = "vs"; vs.textContent = v.vs != null ? String(v.vs) : "vs"; h.appendChild(vs);
        if (R.label) addGrad(String(R.label), RF, RT);
        addPlain(v.post, "post");
      }

      var buildCard = function (sel, data, from, to) {
        var card = document.querySelector(sel); if (!card) return;
        if (data.win) card.classList.add("is-win");
        if (data.icon) { var ic = document.createElement("div"); ic.className = "ic"; ic.textContent = String(data.icon); card.appendChild(ic); }
        var lbl = document.createElement("div"); lbl.className = "lbl grad"; lbl.textContent = data.label != null ? String(data.label) : ""; gradStyle(lbl, from, to); card.appendChild(lbl); fitLbl(lbl, 96, 36);
        var bullets = Array.isArray(data.bullets) ? data.bullets : [];
        if (bullets.length) { var bw = document.createElement("div"); bw.className = "bullets"; bullets.forEach(function (b) { var bz = document.createElement("div"); bz.className = "bz"; bz.textContent = String(b); bw.appendChild(bz); }); card.appendChild(bw); }
        if (data.win) { var w = document.createElement("div"); w.className = "win"; w.textContent = typeof data.win === "string" ? data.win : "WIN"; card.appendChild(w); }
      };
      buildCard(".card.left", L, LF, LT);
      buildCard(".card.right", R, RF, RT);

      var statsEl = document.querySelector(".stats");
      if (statsEl && (L.stat || R.stat)) {
        var buildStat = function (cls, data, from, to) {
          var st = document.createElement("div"); st.className = "stat " + cls;
          var sv = document.createElement("div"); sv.className = "sv grad"; sv.textContent = data.stat != null ? String(data.stat) : ""; gradStyle(sv, from, to);
          var sl = document.createElement("div"); sl.className = "sl"; sl.textContent = data.stat_label != null ? String(data.stat_label) : "";
          st.appendChild(sv); st.appendChild(sl); return st;
        };
        statsEl.appendChild(buildStat("left", L, LF, LT));
        statsEl.appendChild(buildStat("right", R, RF, RT));
      } else if (statsEl) { statsEl.style.display = "none"; }
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
  </script>
</body>
</html>
