<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>Creative Voltage · Portrait 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@700;800;900&family=Dancing+Script:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /*
   * frame-creative-voltage — electric-blue / dark split with a hand-drawn script
   * accent. Vendored from nexu-io/html-video (Apache-2.0) and adapted to
   * HyperFrames 0.6: content in #root, slots via variables, re-laid-out as a
   * top/bottom split for 9:16. Syne → Unbounded and Caveat → Dancing Script
   * (both cover Vietnamese; Space Mono kept). Pure CSS/SVG @keyframes. See
   * NOTICE. Portrait 9:16 (1080×1920).
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  #root { position: relative; width: 1080px; height: 1920px; background: #0a1628; color: #fff;
    font-family: 'Be Vietnam Pro', sans-serif; }

  /* offset split panels (purple-slate top, dark bottom) */
  .panel-t { position: absolute; left: 0; right: 0; top: 0; height: 46%;
    background: linear-gradient(145deg, #120730 0%, #1e0d4e 40%, #2a1265 70%, #1a0a3d 100%);
    transform: translateY(-100%); animation: slideT 0.85s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; }
  .panel-b { position: absolute; left: 0; right: 0; bottom: 0; height: 54%; background: #0a1628;
    transform: translateY(100%); animation: slideB 0.85s cubic-bezier(0.16,1,0.3,1) 0.25s forwards; }
  @keyframes slideT { to { transform: translateY(0); } }
  @keyframes slideB { to { transform: translateY(0); } }

  .glow { position: absolute; left: 0; right: 0; top: 0; height: 46%; z-index: 1; pointer-events: none;
    background: radial-gradient(circle at 35% 45%, rgba(167,139,250,0.28) 0%, rgba(124,58,237,0.12) 40%, transparent 65%); opacity: 0;
    animation: fade 1.2s ease-out 0.9s forwards; }
  @keyframes fade { to { opacity: 1; } }

  /* meta line (top-left, on purple panel) */
  .meta { position: absolute; left: 80px; top: 90px; z-index: 4; font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 26px; font-weight: 800; letter-spacing: 4px;
    background: linear-gradient(90deg, #e9d5ff 0%, #a78bfa 60%, #7c3aed 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    opacity: 0; animation: fade 0.6s ease-out 1.0s forwards; }

  /* handwritten script accent (purple panel) */
  .script { position: absolute; left: 80px; top: 470px; z-index: 4; font-family: 'Dancing Script', cursive;
    font-weight: 700; font-size: 168px; line-height: 0.9; opacity: 0; transform: rotate(-7deg);
    background: linear-gradient(135deg, #ffffff 0%, #ddd6fe 35%, #c4b5fd 65%, #a78bfa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: scriptIn 0.8s ease-out 1.4s forwards; }
  @keyframes scriptIn { 0%{opacity:0;transform:rotate(-7deg) translateY(20px) scale(0.9)}
                        100%{opacity:1;transform:rotate(-7deg) translateY(0) scale(1)} }
  .script-underline { position: absolute; left: 80px; top: 700px; z-index: 4; }
  .script-underline path { stroke: url(#uline-grad); stroke-width: 6; fill: none; stroke-linecap: round;
    stroke-dasharray: 600; stroke-dashoffset: 600; animation: draw 0.9s ease-out 1.9s forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* display title (bottom, dark) */
  .display { position: absolute; left: 80px; right: 80px; top: 1010px; z-index: 4;
    font-weight: 900; font-size: 130px; line-height: 1.0; letter-spacing: -3px; }
  .display .ln { display: block; opacity: 0; transform: translateY(34px);
    animation: up 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    background: linear-gradient(135deg, #ffffff 0%, #bfdbfe 55%, #93c5fd 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .display .volt {
    background: linear-gradient(135deg, #67e8f9 0%, #38bdf8 30%, #6366f1 70%, #a855f7 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  @keyframes up { to { opacity: 1; transform: translateY(0); } }

  /* firework sparks (top panel) */
  .sparks { position: absolute; left: 0; right: 0; top: 0; height: 46%; z-index: 5; pointer-events: none; overflow: hidden; }
  .sp { position: absolute; border-radius: 50%; opacity: 0; }
  @keyframes spk {
    0%   { opacity: 1; transform: translate(0,0) scale(1.4); }
    60%  { opacity: 0.7; }
    100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0.15); }
  }
  @keyframes spk-trail {
    0%   { opacity: 0.6; transform: translate(0,0) scale(0.8); }
    100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0.05); }
  }

  /* mono caption bottom-right (on dark) */
  .caption { position: absolute; right: 80px; bottom: 90px; z-index: 4; font-family: 'Space Mono', monospace;
    font-size: 24px; font-weight: 400; letter-spacing: 2px; color: rgba(255,255,255,0.55);
    opacity: 0; animation: fade 0.6s ease-out 2.2s forwards; }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="5"
    data-width="1080"
    data-height="1920"
    data-composition-variables='{"meta":"// CHE_DO_SANG_TAO · ON","display_lines":["Dựng","mọi","video."],"accent_index":1,"script":"làm nó chạy","caption":"AI Coding · creative voltage"}'
  >
    <div class="panel-t"></div>
    <div class="panel-b"></div>
    <div class="glow"></div>
    <div class="sparks"></div>

    <div class="meta"></div>

    <div class="script"></div>
    <svg class="script-underline" width="560" height="70" viewBox="0 0 560 70" fill="none">
      <defs>
        <linearGradient id="uline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ddd6fe"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
      <path d="M8 46 C 150 14, 400 14, 552 38"/>
    </svg>

    <div class="display"></div>

    <div class="caption"></div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes &&
               typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      var set = function (sel, text) {
        var el = document.querySelector(sel);
        if (el && text != null) el.textContent = String(text);
      };
      set(".meta", v.meta);
      set(".script", v.script);
      set(".caption", v.caption);

      // Fireworks on top panel — small bursts that fly in after panel slides
      var sparks = document.querySelector(".sparks");
      if (sparks) {
        var pal = ["#ffffff","#ddd6fe","#c4b5fd","#a78bfa","#7c3aed","#67e8f9","#f0abfc","#fde68a"];
        // burst centres relative to top panel (46% of 1920 ≈ 883px tall)
        var bursts = [
          { cx: 820, cy: 180, delay: 0.95, count: 9 },
          { cx: 280, cy: 340, delay: 1.15, count: 8 },
          { cx: 960, cy: 480, delay: 1.30, count: 7 },
          { cx: 540, cy: 120, delay: 1.50, count: 8 },
          { cx: 140, cy: 600, delay: 1.65, count: 6 }
        ];
        bursts.forEach(function(b) {
          for (var i = 0; i < b.count; i++) {
            var angle = (i / b.count) * Math.PI * 2 + (Math.random() * 0.4 - 0.2);
            var dist = 55 + Math.random() * 90;
            var dx = Math.cos(angle) * dist;
            var dy = Math.sin(angle) * dist;
            var size = 5 + Math.random() * 10;
            var color = pal[Math.floor(Math.random() * pal.length)];
            var jitter = Math.random() * 0.18;
            var dur = (0.65 + Math.random() * 0.35).toFixed(2);
            var sp = document.createElement("div");
            sp.className = "sp";
            sp.style.left = b.cx + "px";
            sp.style.top  = b.cy + "px";
            sp.style.width = size + "px";
            sp.style.height = size + "px";
            sp.style.background = color;
            sp.style.setProperty("--dx", dx.toFixed(1) + "px");
            sp.style.setProperty("--dy", dy.toFixed(1) + "px");
            sp.style.animation = "spk " + dur + "s ease-out " + (b.delay + jitter).toFixed(2) + "s forwards";
            sparks.appendChild(sp);
            // inner trailing dot
            if (Math.random() > 0.45) {
              var tr = document.createElement("div");
              tr.className = "sp";
              tr.style.left = b.cx + "px";
              tr.style.top  = b.cy + "px";
              tr.style.width = Math.max(2, size * 0.4) + "px";
              tr.style.height = Math.max(2, size * 0.4) + "px";
              tr.style.background = "#fff";
              tr.style.setProperty("--dx", (dx * 0.5).toFixed(1) + "px");
              tr.style.setProperty("--dy", (dy * 0.5).toFixed(1) + "px");
              tr.style.animation = "spk-trail " + dur + "s ease-out " + (b.delay + jitter + 0.06).toFixed(2) + "s forwards";
              sparks.appendChild(tr);
            }
          }
        });
      }
      // Display title: build lines, mark accent_index as the electric .volt line.
      var lines = Array.isArray(v.display_lines) ? v.display_lines : [];
      var ai = typeof v.accent_index === "number" ? v.accent_index : 1;
      var disp = document.querySelector(".display");
      if (disp) {
        disp.textContent = "";
        lines.forEach(function (t, i) {
          var span = document.createElement("span");
          span.className = "ln" + (i === ai ? " volt" : "");
          span.textContent = String(t);
          span.style.animationDelay = (1.0 + i * 0.18).toFixed(2) + "s";
          disp.appendChild(span);
        });
      }
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
  </script>
</body>
</html>
