<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>Bold Poster · Editorial Statement Frame</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Be+Vietnam+Pro:wght@500;700&family=Lora:ital@1&display=swap" rel="stylesheet" />
<style>
  /*
   * frame-bold-poster — 1970s European editorial poster, in motion.
   * Vendored from nexu-io/html-video (Apache-2.0) and adapted into a native
   * HyperFrames 0.6 composition: content wrapped in a #root composition node,
   * sample copy replaced by data-composition-variables slots. CSS @keyframes
   * timeline is unchanged — HyperFrames seeks it frame-by-frame.
   * See NOTICE for attribution.
   *
   * Palette: white sheet #F5F2EF, brown-black ink #1C1410, one tomato red #D8000F.
   * Type stack (Vietnamese-capable): Alfa Slab One (display + figures),
   * Lora italic (serif standfirst), Be Vietnam Pro (labels / chrome).
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: #F5F2EF; }
  #root {
    position: relative; width: 1920px; height: 1080px;
    background: #F5F2EF; color: #1C1410;
    font-family: 'Be Vietnam Pro', sans-serif;
  }

  /* full-bleed paper, fades up first so the cut feels printed not lit */
  .sheet { position: absolute; inset: 0; background: #F5F2EF;
    opacity: 0; animation: sheetIn 0.5s ease-out forwards; }
  @keyframes sheetIn { to { opacity: 1; } }

  /* top kicker: mono label + a red rule that draws across */
  .kicker { position: absolute; top: 92px; left: 110px; right: 110px;
    display: flex; align-items: center; gap: 28px; }
  .kicker .label { font-size: 22px; font-weight: 700; letter-spacing: 6px;
    text-transform: uppercase; color: #1C1410; white-space: nowrap;
    opacity: 0; animation: fade 0.5s ease-out 0.35s forwards; }
  .kicker .rule { flex: 1; height: 3px; background: #D8000F; transform-origin: left center;
    transform: scaleX(0); animation: ruleX 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; }
  .kicker .date { font-size: 22px; font-weight: 500; letter-spacing: 3px;
    text-transform: uppercase; color: #1C1410; white-space: nowrap;
    opacity: 0; animation: fade 0.5s ease-out 0.55s forwards; }
  @keyframes ruleX { to { transform: scaleX(1); } }

  /* giant red figure — the poster's loudest move, rotates + drops in */
  .figure { position: absolute; top: 150px; right: 96px; font-family: 'Alfa Slab One', cursive;
    font-size: 300px; line-height: 0.8; color: #D8000F; letter-spacing: 1px;
    opacity: 0; transform: translateY(-60px) rotate(-14deg);
    animation: figureIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards; }
  @keyframes figureIn { to { opacity: 1; transform: translateY(0) rotate(-6deg); } }

  /* three-line headline, each line its own tilt, rising in sequence */
  .head { position: absolute; left: 110px; bottom: 300px; font-family: 'Alfa Slab One', cursive;
    line-height: 0.92; }
  .head .ln { display: block; font-size: 132px; opacity: 0; transform: translateY(40px); }
  .head .ln1 { color: #1C1410; transform-origin: left bottom; animation: lineUp 0.7s cubic-bezier(0.16,1,0.3,1) 1.15s forwards; }
  .head .ln2 { color: #D8000F; animation: lineUpTilt 0.7s cubic-bezier(0.16,1,0.3,1) 1.35s forwards; }
  .head .ln3 { color: #1C1410; animation: lineUpTilt2 0.7s cubic-bezier(0.16,1,0.3,1) 1.55s forwards; }
  @keyframes lineUp { to { opacity: 1; transform: translateY(0) rotate(-2deg); } }
  @keyframes lineUpTilt { to { opacity: 1; transform: translateY(0) rotate(-4deg); } }
  @keyframes lineUpTilt2 { to { opacity: 1; transform: translateY(0) rotate(2deg); } }

  /* serif standfirst */
  .standfirst { position: absolute; left: 114px; bottom: 170px; max-width: 980px;
    font-family: 'Lora', serif; font-style: italic; font-size: 34px;
    line-height: 1.4; color: #1C1410;
    opacity: 0; animation: fadeUp 0.7s ease-out 1.95s forwards; }
  @keyframes fadeUp { 0%{opacity:0;transform:translateY(22px)} 100%{opacity:1;transform:translateY(0)} }

  /* footer: ink rule + mono metadata */
  .footer { position: absolute; left: 110px; right: 110px; bottom: 96px; }
  .footer .rule { height: 2px; background: #1C1410; transform-origin: left center;
    transform: scaleX(0); animation: ruleX 0.7s cubic-bezier(0.16,1,0.3,1) 2.15s forwards; }
  .footer .meta { display: flex; justify-content: space-between; margin-top: 18px;
    font-size: 18px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
    color: #1C1410; opacity: 0; animation: fade 0.6s ease-out 2.4s forwards; }
  .footer .meta .red { color: #D8000F; }

  @keyframes fade { to { opacity: 1; } }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="5"
    data-width="1920"
    data-height="1080"
    data-composition-variables='{"kicker":"Manifesto","date":"Vol. 04 · 2026","figure":"03","headline":["Make it","loud.","Make it last."],"standfirst":"Every slide should land like a printed page — set in heavy type, locked to one red accent, ruled in ink.","footer_left":"Bold Poster","footer_right":"html-video"}'
  >
    <div class="sheet"></div>

    <div class="kicker">
      <span class="label"></span>
      <span class="rule"></span>
      <span class="date"></span>
    </div>

    <div class="figure"></div>

    <div class="head">
      <span class="ln ln1"></span>
      <span class="ln ln2"></span>
      <span class="ln ln3"></span>
    </div>

    <div class="standfirst"></div>

    <div class="footer">
      <div class="rule"></div>
      <div class="meta">
        <span class="meta-left"></span>
        <span class="red meta-right"></span>
      </div>
    </div>
  </div>

  <script>
    // Deterministic content injection: merge --variables over the declared
    // data-composition-variables defaults, populate text slots. No randomness,
    // no network, no Date.now() — required by HyperFrames render rules.
    (function () {
      var v = (window.__hyperframes &&
               typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      var set = function (sel, text) {
        var el = document.querySelector(sel);
        if (el && text != null) el.textContent = String(text);
      };
      var head = Array.isArray(v.headline) ? v.headline : [];
      set(".kicker .label", v.kicker);
      set(".kicker .date", v.date);
      set(".figure", v.figure);
      set(".head .ln1", head[0]);
      set(".head .ln2", head[1]);
      set(".head .ln3", head[2]);
      set(".standfirst", v.standfirst);
      set(".footer .meta-left", v.footer_left);
      set(".footer .meta-right", v.footer_right);
    })();

    // Animations are pure CSS @keyframes (HyperFrames seeks them directly);
    // register an empty paused timeline so the runtime finds the composition.
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
  </script>
</body>
</html>
