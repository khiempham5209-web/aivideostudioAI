<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1920, height=1080" />
        <title>Vignelli Stat · 16:9</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            /*
   * frame-vignelli — Massimo Vignelli editorial stat hero (charcoal + one red
   * accent column + heavy grotesque numerals). Distilled from nexu-io/html-video
   * "Vignelli" (Apache-2.0), rebuilt as a self-contained CSS @keyframes timeline
   * (no A-roll video, no captions). Archivo covers Vietnamese. See NOTICE.
   * Landscape 16:9; 9:16 lives at compositions/portrait.html.
   */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1920px;
                height: 1080px;
                overflow: hidden;
                background: #1a1a1a;
            }
            #root {
                position: relative;
                width: 1920px;
                height: 1080px;
                background: #1a1a1a;
                color: #fff;
                font-family: "Archivo", "Helvetica Neue", Arial, sans-serif;
            }

            .grid {
                position: absolute;
                inset: 0;
                display: grid;
                grid-template-columns: repeat(6, 1fr);
                z-index: 1;
                opacity: 0;
                animation: fade 0.8s ease-out 0.2s forwards;
            }
            .grid .col {
                border-right: 1px solid rgba(255, 255, 255, 0.05);
            }

            .red-col {
                position: absolute;
                top: 0;
                right: 0;
                width: 200px;
                height: 100%;
                background: #cc0000;
                z-index: 2;
                transform: translateX(100%);
                animation: slideInR 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s
                    forwards;
            }
            @keyframes slideInR {
                to {
                    transform: translateX(0);
                }
            }

            .content {
                position: absolute;
                left: 110px;
                right: 320px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 5;
            }

            .kicker {
                display: flex;
                align-items: center;
                gap: 22px;
                margin-bottom: 38px;
                opacity: 0;
                animation: fadeUp 0.6s ease-out 0.8s forwards;
            }
            .kicker .bar {
                width: 64px;
                height: 8px;
                background: #cc0000;
            }
            .kicker .txt {
                font-size: 24px;
                font-weight: 700;
                letter-spacing: 5px;
                text-transform: uppercase;
                color: #fff;
            }

            .number {
                font-size: 340px;
                font-weight: 900;
                line-height: 0.8;
                letter-spacing: -12px;
                color: #ffb800;
                opacity: 0;
                transform: translateY(80px);
                animation: numUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
            }
            @keyframes numUp {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .label {
                font-size: 72px;
                font-weight: 700;
                text-transform: uppercase;
                color: #fff;
                line-height: 1.05;
                margin-top: 28px;
                max-width: 1000px;
                opacity: 0;
                transform: translateY(40px);
                animation: numUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.3s
                    forwards;
            }

            .note {
                font-size: 30px;
                font-weight: 500;
                color: #9a9a9a;
                line-height: 1.4;
                margin-top: 34px;
                max-width: 900px;
                opacity: 0;
                animation: fadeUp 0.8s ease-out 1.6s forwards;
            }

            .brand {
                position: absolute;
                left: 110px;
                bottom: 90px;
                z-index: 5;
            }
            .brand .mark {
                font-size: 34px;
                font-weight: 900;
                letter-spacing: 8px;
                text-transform: uppercase;
                color: #fff;
                opacity: 0;
                animation: fadeUp 0.6s ease-out 2s forwards;
            }
            .brand .underline {
                width: 280px;
                height: 8px;
                background: #cc0000;
                margin-top: 12px;
                transform-origin: left;
                transform: scaleX(0);
                animation: scaleXin 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2.2s
                    forwards;
            }
            @keyframes scaleXin {
                to {
                    transform: scaleX(1);
                }
            }

            @keyframes fade {
                to {
                    opacity: 1;
                }
            }
            @keyframes fadeUp {
                0% {
                    opacity: 0;
                    transform: translateY(20px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1920"
            data-height="1080"
            data-composition-variables='{"kicker":"Khảo sát · 2026","number":"62%","label":"Nội dung tĩnh mất hút","note":"Phần lớn người xem lướt qua nội dung tĩnh chỉ trong vài giây đầu.","brand":"AI Coding"}'
        >
            <div class="grid">
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
            </div>
            <div class="red-col"></div>

            <div class="content">
                <div class="kicker">
                    <span class="bar"></span><span class="txt"></span>
                </div>
                <div class="number"></div>
                <div class="label"></div>
                <div class="note"></div>
            </div>

            <div class="brand">
                <div class="mark"></div>
                <div class="underline"></div>
            </div>
        </div>

        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".kicker .txt", v.kicker);
                set(".number", v.number);
                set(".label", v.label);
                set(".note", v.note);
                set(".brand .mark", v.brand);

                /* Auto-scale to prevent overflow */
                var fitText = function (el, maxPx, minPx) {
                    if (!el || !el.textContent.trim()) return;
                    el.style.whiteSpace = "nowrap";
                    el.style.fontSize = maxPx + "px";
                    if (el.scrollWidth > el.offsetWidth) {
                        var sized = Math.max(minPx, Math.floor(maxPx * el.offsetWidth / el.scrollWidth));
                        el.style.fontSize = sized + "px";
                    }
                    el.style.whiteSpace = "";
                };
                fitText(document.querySelector(".number"), 340, 80);
                fitText(document.querySelector(".label"), 72, 28);
            })();
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function () {},
                paused: function () {
                    return true;
                },
            };
        </script>
    </body>
</html>
