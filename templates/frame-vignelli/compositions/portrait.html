<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1080, height=1920" />
        <title>Vignelli Stat · Portrait 9:16</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            /*
   * frame-vignelli — Massimo Vignelli editorial stat hero. Distilled from the
   * nexu-io/html-video "Vignelli" template (Apache-2.0): charcoal canvas, one
   * red #cc0000 accent column, 6-column grid, heavy grotesque numerals. Rebuilt
   * as a self-contained CSS @keyframes timeline (no A-roll video, no captions).
   * Archivo stands in for Helvetica Neue and already covers Vietnamese.
   * See NOTICE. Portrait 9:16 (1080×1920).
   */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1080px;
                height: 1920px;
                overflow: hidden;
                background: #020c1a;
            }
            #root {
                position: relative;
                width: 1080px;
                height: 1920px;
                background: #020c1a;
                color: #fff;
                font-family: "Archivo", "Helvetica Neue", Arial, sans-serif;
            }

            /* 6-column grid (faint) */
            .grid {
                position: absolute;
                inset: 0;
                display: grid;
                grid-template-columns: repeat(6, 1fr);
                z-index: 1;
                opacity: 0;
                animation: fade 0.8s ease-out 0.2s forwards;
            }
            .grid .col {
                border-right: 1px solid rgba(255, 255, 255, 0.05);
            }

            .content {
                position: absolute;
                left: 90px;
                right: 90px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 5;
            }

            .kicker {
                display: flex;
                align-items: center;
                gap: 22px;
                margin-bottom: 44px;
                opacity: 0;
                animation: fadeUp 0.6s ease-out 0.8s forwards;
            }
            .kicker .bar {
                width: 64px;
                height: 8px;
                background: #38bdf8;
            }
            .kicker .txt {
                font-size: 26px;
                font-weight: 700;
                letter-spacing: 5px;
                text-transform: uppercase;
                color: #fff;
            }

            .number {
                font-size: 360px;
                font-weight: 900;
                line-height: 0.8;
                letter-spacing: -12px;
                background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                opacity: 0;
                transform: translateY(80px);
                animation: numUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
            }
            @keyframes numUp {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .label {
                font-size: 70px;
                font-weight: 700;
                text-transform: uppercase;
                color: #fff;
                line-height: 1.05;
                margin-top: 34px;
                max-width: 640px;
                opacity: 0;
                transform: translateY(40px);
                animation: numUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.3s
                    forwards;
            }

            .note {
                font-size: 34px;
                font-weight: 500;
                color: #7ec8e3;
                line-height: 1.45;
                margin-top: 40px;
                max-width: 660px;
                opacity: 0;
                animation: fadeUp 0.8s ease-out 1.6s forwards;
            }

            /* footer wordmark + red underline */
            .brand {
                position: absolute;
                left: 90px;
                bottom: 110px;
                z-index: 5;
            }
            .brand .mark {
                font-size: 38px;
                font-weight: 900;
                letter-spacing: 8px;
                text-transform: uppercase;
                color: #fff;
                opacity: 0;
                animation: fadeUp 0.6s ease-out 2s forwards;
            }
            .brand .underline {
                width: 280px;
                height: 8px;
                background: linear-gradient(90deg, #38bdf8, #818cf8);
                margin-top: 12px;
                transform-origin: left;
                transform: scaleX(0);
                animation: scaleXin 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2.2s
                    forwards;
            }
            @keyframes scaleXin {
                to {
                    transform: scaleX(1);
                }
            }

            @keyframes fade {
                to {
                    opacity: 1;
                }
            }
            @keyframes fadeUp {
                0% {
                    opacity: 0;
                    transform: translateY(20px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* floating bubbles */
            @keyframes fb1 {
                0%, 100% { transform: translate(0, 0) scale(1); }
                40%       { transform: translate(24px, -40px) scale(1.06); }
                70%       { transform: translate(-18px, -20px) scale(0.94); }
            }
            @keyframes fb2 {
                0%, 100% { transform: translate(0, 0) scale(1.02); }
                35%       { transform: translate(-30px, 28px) scale(0.92); }
                68%       { transform: translate(20px, -34px) scale(1.08); }
            }
            @keyframes fb3 {
                0%, 100% { transform: translate(0, 0) scale(0.96); }
                45%       { transform: translate(18px, 36px) scale(1.1); }
                80%       { transform: translate(-22px, 16px) scale(0.94); }
            }
            @keyframes fb4 {
                0%, 100% { transform: translate(0, 0) scale(1); }
                50%       { transform: translate(-28px, -28px) scale(1.07); }
            }
            .bubble {
                position: absolute;
                border-radius: 50%;
                pointer-events: none;
                z-index: 1;
            }
            .bb1 {
                width: 130px; height: 130px;
                top: 12%; left: 8%;
                background: radial-gradient(circle at 35% 35%, rgba(56,189,248,0.22), rgba(56,189,248,0.04));
                border: 1.5px solid rgba(56,189,248,0.18);
                box-shadow: 0 0 30px rgba(56,189,248,0.12), inset 0 0 20px rgba(56,189,248,0.06);
                animation: fb1 14s ease-in-out infinite;
            }
            .bb2 {
                width: 88px; height: 88px;
                top: 28%; right: 10%;
                background: radial-gradient(circle at 35% 30%, rgba(129,140,248,0.25), rgba(129,140,248,0.04));
                border: 1.5px solid rgba(129,140,248,0.2);
                box-shadow: 0 0 24px rgba(129,140,248,0.14), inset 0 0 16px rgba(129,140,248,0.06);
                animation: fb2 11s ease-in-out infinite;
            }
            .bb3 {
                width: 160px; height: 160px;
                bottom: 18%; right: 7%;
                background: radial-gradient(circle at 40% 35%, rgba(56,189,248,0.15), rgba(56,189,248,0.03));
                border: 1.5px solid rgba(56,189,248,0.12);
                box-shadow: 0 0 36px rgba(56,189,248,0.1), inset 0 0 24px rgba(56,189,248,0.05);
                animation: fb3 16s ease-in-out infinite;
            }
            .bb4 {
                width: 72px; height: 72px;
                bottom: 32%; left: 6%;
                background: radial-gradient(circle at 38% 32%, rgba(140,82,255,0.22), rgba(140,82,255,0.04));
                border: 1.5px solid rgba(140,82,255,0.16);
                box-shadow: 0 0 20px rgba(140,82,255,0.12), inset 0 0 12px rgba(140,82,255,0.05);
                animation: fb4 9s ease-in-out infinite;
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1080"
            data-height="1920"
            data-composition-variables='{"kicker":"Khảo sát · 2026","number":"62%","label":"Nội dung tĩnh mất hút","note":"Phần lớn người xem lướt qua nội dung tĩnh chỉ trong vài giây đầu.","brand":"AI Coding"}'
        >
            <div class="bubble bb1"></div>
            <div class="bubble bb2"></div>
            <div class="bubble bb3"></div>
            <div class="bubble bb4"></div>

            <div class="grid">
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
            </div>
            <div class="content">
                <div class="kicker">
                    <span class="bar"></span><span class="txt"></span>
                </div>
                <div class="number"></div>
                <div class="label"></div>
                <div class="note"></div>
            </div>

            <div class="brand">
                <div class="mark"></div>
                <div class="underline"></div>
            </div>
        </div>

        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".kicker .txt", v.kicker);
                set(".number", v.number);
                set(".label", v.label);
                set(".note", v.note);
                set(".brand .mark", v.brand);

                /* Auto-scale to prevent overflow */
                var fitText = function (el, maxPx, minPx) {
                    if (!el || !el.textContent.trim()) return;
                    el.style.whiteSpace = "nowrap";
                    el.style.fontSize = maxPx + "px";
                    if (el.scrollWidth > el.offsetWidth) {
                        var sized = Math.max(minPx, Math.floor(maxPx * el.offsetWidth / el.scrollWidth));
                        el.style.fontSize = sized + "px";
                    }
                    el.style.whiteSpace = "";
                };
                fitText(document.querySelector(".number"), 360, 80);
                fitText(document.querySelector(".label"), 70, 28);
            })();
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function () {},
                paused: function () {
                    return true;
                },
            };
        </script>
    </body>
</html>
