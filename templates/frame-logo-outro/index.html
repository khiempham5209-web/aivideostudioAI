<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1920, height=1080" />
        <title>Logo Outro · 16:9</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700;800;900&family=Inter:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            /*
   * frame-logo-outro — segmented logo assembly + glow bloom + tagline reveal.
   * Vendored from nexu-io/html-video (Apache-2.0), adapted to HyperFrames 0.6
   * (Tailwind CDN → plain CSS, Noto Sans SC dropped, slots via variables).
   * Inter Tight covers Vietnamese. See NOTICE. Landscape 16:9; 9:16 portrait
   * at compositions/portrait.html.
   */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1920px;
                height: 1080px;
                overflow: hidden;
            }
            #root {
                position: relative;
                width: 1920px;
                height: 1080px;
                background: radial-gradient(
                    circle at 50% 45%,
                    #1a1535 0%,
                    #08090c 70%
                );
                color: #f5f5f7;
                font-family: "Inter Tight", system-ui, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            .accent {
                color: #7c5cff;
            }
            .ribbon {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 6px;
                background: #7c5cff;
            }

            @keyframes pieceIn {
                0% {
                    opacity: 0;
                    transform: scale(1.4) translate(var(--dx, 0), var(--dy, 0));
                }
                100% {
                    opacity: 1;
                    transform: scale(1) translate(0, 0);
                }
            }
            @keyframes glow {
                from {
                    filter: drop-shadow(0 0 0 transparent);
                }
                to {
                    filter: drop-shadow(0 0 40px rgba(124, 92, 255, 0.6));
                }
            }
            .logo-wrap {
                position: relative;
                width: 200px;
                height: 200px;
                animation: glow 0.8s ease-out 1.1s both;
            }
            .logo-wrap svg {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
            }
            .piece {
                transform-box: fill-box;
                transform-origin: center;
                animation: pieceIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            }
            .piece:nth-child(1) {
                --dx: -80px;
                --dy: -40px;
                animation-delay: 0s;
            }
            .piece:nth-child(2) {
                --dx: 60px;
                --dy: -50px;
                animation-delay: 0.08s;
            }
            .piece:nth-child(3) {
                --dx: -40px;
                --dy: 50px;
                animation-delay: 0.16s;
            }
            .piece:nth-child(4) {
                --dx: 0;
                --dy: -70px;
                animation-delay: 0.24s;
            }
            .piece:nth-child(5) {
                --dx: 70px;
                --dy: 40px;
                animation-delay: 0.32s;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .brand {
                margin-top: 48px;
                font-weight: 900;
                letter-spacing: -2px;
                line-height: 0.95;
                font-size: 104px;
                text-align: center;
                max-width: 1400px;
                animation: fadeUp 0.8s ease-out 1.4s both;
            }
            .tagline {
                margin-top: 22px;
                font-size: 32px;
                opacity: 0.72;
                font-weight: 500;
                text-align: center;
                max-width: 1100px;
                line-height: 1.35;
                animation: fadeUp 0.8s ease-out 1.7s both;
            }
            .meta {
                margin-top: 56px;
                display: flex;
                align-items: center;
                gap: 22px;
                font-size: 19px;
                text-transform: uppercase;
                letter-spacing: 4px;
                opacity: 0.55;
                font-weight: 500;
                animation: fadeUp 0.6s ease-out 2.1s both;
            }

            @keyframes shimmer {
                0% {
                    background-position: -200% 0;
                }
                100% {
                    background-position: 200% 0;
                }
            }
            .shimmer {
                background: linear-gradient(
                    120deg,
                    #f5f5f7 30%,
                    rgba(255, 255, 255, 0.45) 50%,
                    #f5f5f7 70%
                );
                background-size: 200% 100%;
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                animation: shimmer 1.8s ease-out 1.9s 1 both;
            }

            .corner {
                position: absolute;
                bottom: 52px;
                font-size: 16px;
                font-family: "Inter", monospace;
                opacity: 0.32;
                text-transform: uppercase;
                letter-spacing: 4px;
                animation: fadeUp 0.6s ease-out 2.3s both;
            }
            .corner.left {
                left: 90px;
            }
            .corner.right {
                right: 90px;
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1920"
            data-height="1080"
            data-composition-variables='{"brand_name":"AI Coding","tagline":"Bản tin mới mỗi ngày","primary_url":"https://aicodingvn.vercel.app/"}'
        >
            <div class="ribbon"></div>

            <div class="logo-wrap">
                <svg viewBox="0 0 140 140" fill="none">
                    <!-- "</>" code glyph, assembled from 3 pieces -->
                    <path
                        class="piece"
                        d="M50 34 L22 70 L50 106"
                        stroke="#7c5cff"
                        stroke-width="14"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                    <path
                        class="piece"
                        d="M80 26 L60 114"
                        stroke="#f5f5f7"
                        stroke-width="14"
                        stroke-linecap="round"
                    />
                    <path
                        class="piece"
                        d="M90 34 L118 70 L90 106"
                        stroke="#7c5cff"
                        stroke-width="14"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />
                </svg>
            </div>

            <h1 class="brand"><span class="shimmer"></span></h1>
            <p class="tagline"></p>
            <div class="meta"><span class="meta-url"></span></div>

            <div class="corner left">AI Coding</div>
            <div class="corner right">Bye Các Con Vợ</div>
        </div>

        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".brand .shimmer", v.brand_name);
                set(".tagline", v.tagline);
                set(".meta-url", v.primary_url);
            })();
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function () {},
                paused: function () {
                    return true;
                },
            };
        </script>
    </body>
</html>
