<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>AI Coding List · 16:9</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /*
   * frame-aicoding-list — original template for this repo. Dark glossy impact /
   * comparison list (warm gradient glow + big gradient-accent title + rounded
   * item cards with coloured icon chip + coloured level tag). Be Vietnam Pro
   * covers Vietnamese. See NOTICE. Landscape 16:9; 9:16 at compositions/portrait.html.
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  #root { position: relative; width: 1920px; height: 1080px; background: #08080f; color: #f4f5fb;
    font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center; }

  .bg { position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(1100px 800px at 16% 6%, rgba(255,86,34,0.20) 0%, transparent 52%),
      radial-gradient(900px 700px at 90% 12%, rgba(120,60,255,0.13) 0%, transparent 55%),
      radial-gradient(1200px 900px at 50% 110%, rgba(40,120,255,0.10) 0%, transparent 60%); }
  .grid { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.5;
    background-image: linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 60px 60px; mask-image: radial-gradient(circle at 50% 45%, #000 0%, transparent 80%); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }

  .head { position: relative; z-index: 4; text-align: center; margin-bottom: 56px; }
  .title { font-weight: 800; font-size: 84px; line-height: 1.05; letter-spacing: -2px;
    opacity: 0; animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) 0.15s both; }
  .title .accent { background: linear-gradient(92deg, #ff9a3d 0%, #ff5a2c 45%, #ff2d55 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .subtitle { margin-top: 18px; font-size: 28px; font-weight: 500; color: rgba(244,245,251,0.55);
    opacity: 0; animation: fadeDown 0.8s ease-out 0.4s both; }

  .list { position: relative; z-index: 4; width: 1280px; display: flex; flex-direction: column; gap: 22px; }
  .item { position: relative; display: flex; align-items: center; gap: 30px; padding: 28px 40px;
    border-radius: 26px; background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    opacity: 0; transform: translateY(26px); animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    --c: #ffb020; --cbg: rgba(255,176,32,0.14); --cbd: rgba(255,176,32,0.42); }
  .item::before { content: ''; position: absolute; left: 0; top: 18px; bottom: 18px; width: 6px;
    border-radius: 0 6px 6px 0; background: var(--c); box-shadow: 0 0 24px var(--c); opacity: 0.9; }
  .item.lv-danger { --c: #ff4d5e; --cbg: rgba(255,77,94,0.15); --cbd: rgba(255,77,94,0.45); }
  .item.lv-warn   { --c: #ffb020; --cbg: rgba(255,176,32,0.15); --cbd: rgba(255,176,32,0.45); }
  .item.lv-good   { --c: #2ee6a0; --cbg: rgba(46,230,160,0.15); --cbd: rgba(46,230,160,0.45); }
  .item.lv-info   { --c: #45a6ff; --cbg: rgba(69,166,255,0.15); --cbd: rgba(69,166,255,0.45); }

  .chip { flex: 0 0 auto; width: 84px; height: 84px; border-radius: 22px; display: flex; align-items: center; justify-content: center;
    font-size: 42px; background: var(--cbg); border: 1px solid var(--cbd); }
  .body { flex: 1 1 auto; min-width: 0; }
  .it-title { font-weight: 700; font-size: 38px; line-height: 1.15; color: #f4f5fb; }
  .it-desc { margin-top: 6px; font-size: 23px; font-weight: 400; color: rgba(244,245,251,0.5); line-height: 1.3; }
  .tag { flex: 0 0 auto; margin-left: 20px; font-weight: 800; font-size: 40px; letter-spacing: 1px; color: var(--c);
    text-shadow: 0 0 28px var(--cbd); }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="5"
    data-width="1920"
    data-height="1080"
    data-composition-variables='{"title":"Ai đang bị ","accent":"tác động","subtitle":"Từ nền tảng cũ đến chuẩn hoá bằng AI","items":[{"icon":"🚫","title":"Khoá học đại trà","desc":"Tác động rất cao / người học chuyển sang AI","tag":"Nguy","level":"danger"},{"icon":"⚠️","title":"LMS truyền thống","desc":"42% doanh nghiệp đang thay thế","tag":"Cao","level":"warn"},{"icon":"⚠️","title":"Gia công nội dung","desc":"AI tự tạo nội dung, giảm nhu cầu","tag":"Cao","level":"warn"},{"icon":"✅","title":"Nền tảng AI-native","desc":"Hưởng lợi ngược / tăng 33.8%","tag":"Lợi","level":"good"}]}'
  >
    <div class="bg"></div>
    <div class="grid"></div>

    <div class="head">
      <h1 class="title"></h1>
      <div class="subtitle"></div>
    </div>

    <div class="list"></div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes &&
               typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      var titleEl = document.querySelector(".title");
      var title = v.title != null ? String(v.title) : "";
      var accent = v.accent != null ? String(v.accent) : "";
      if (titleEl) {
        titleEl.textContent = "";
        titleEl.appendChild(document.createTextNode(title));
        if (accent) {
          var s = document.createElement("span");
          s.className = "accent";
          s.textContent = accent;
          if (v.accent_from && v.accent_to) {
            s.style.backgroundImage =
              "linear-gradient(92deg, " + v.accent_from + " 0%, " + v.accent_to + " 100%)";
          }
          titleEl.appendChild(s);
        }
      }
      var sub = document.querySelector(".subtitle");
      if (sub && v.subtitle != null) sub.textContent = String(v.subtitle);

      var levels = { danger: 1, warn: 1, good: 1, info: 1 };
      var list = document.querySelector(".list");
      var items = Array.isArray(v.items) ? v.items : [];
      items.slice(0, 5).forEach(function (it, i) {
        it = it || {};
        var lvl = it.level && levels[it.level] ? it.level : "warn";
        var card = document.createElement("div");
        card.className = "item lv-" + lvl;
        card.style.animationDelay = (0.5 + i * 0.12).toFixed(2) + "s";
        var chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = it.icon != null ? String(it.icon) : "";
        var body = document.createElement("div");
        body.className = "body";
        var t = document.createElement("div");
        t.className = "it-title";
        t.textContent = it.title != null ? String(it.title) : "";
        var d = document.createElement("div");
        d.className = "it-desc";
        d.textContent = it.desc != null ? String(it.desc) : "";
        body.appendChild(t);
        body.appendChild(d);
        var tag = document.createElement("div");
        tag.className = "tag";
        tag.textContent = it.tag != null ? String(it.tag) : "";
        card.appendChild(chip);
        card.appendChild(body);
        card.appendChild(tag);
        list.appendChild(card);
      });
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
  </script>
</body>
</html>
