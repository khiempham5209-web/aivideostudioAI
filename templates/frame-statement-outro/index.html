<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1920, height=1080" />
        <title>Statement Outro · 16:9</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Be+Vietnam+Pro:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            /*
   * frame-statement-outro — closing card (Bold Poster design system).
   * Original work for this repo. Landscape 16:9 (1920×1080). The 9:16 layout
   * lives at compositions/portrait.html.
   */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1920px;
                height: 1080px;
                overflow: hidden;
                background: #f5f2ef;
            }
            #root {
                position: relative;
                width: 1920px;
                height: 1080px;
                background: #f5f2ef;
                color: #1c1410;
                font-family: "Be Vietnam Pro", sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            .sheet {
                position: absolute;
                inset: 0;
                background: #f5f2ef;
                opacity: 0;
                animation: fade 0.5s ease-out forwards;
            }
            .rule-top {
                width: 0;
                height: 5px;
                background: #d8000f;
                margin-bottom: 48px;
                animation: ruleW 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.4s
                    forwards;
            }
            @keyframes ruleW {
                to {
                    width: 360px;
                }
            }
            .cta {
                font-size: 44px;
                font-weight: 500;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: #1c1410;
                text-align: center;
                max-width: 1100px;
                line-height: 1.2;
                opacity: 0;
                transform: translateY(20px);
                animation: rise 0.7s ease-out 0.7s forwards;
            }
            .channel {
                font-family: "Alfa Slab One", cursive;
                font-size: 150px;
                line-height: 1;
                color: #d8000f;
                text-align: center;
                margin: 28px 0 36px;
                max-width: 1500px;
                opacity: 0;
                transform: translateY(40px) rotate(-3deg);
                animation: riseTilt 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s
                    forwards;
            }
            @keyframes riseTilt {
                to {
                    opacity: 1;
                    transform: translateY(0) rotate(-2deg);
                }
            }
            .source {
                font-size: 28px;
                font-weight: 500;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: rgba(28, 20, 16, 0.55);
                text-align: center;
                opacity: 0;
                animation: fade 0.6s ease-out 1.5s forwards;
            }
            .rule-bot {
                width: 0;
                height: 2px;
                background: #1c1410;
                margin-top: 48px;
                animation: ruleW2 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.7s
                    forwards;
            }
            @keyframes ruleW2 {
                to {
                    width: 560px;
                }
            }
            @keyframes fade {
                to {
                    opacity: 1;
                }
            }
            @keyframes rise {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1920"
            data-height="1080"
            data-composition-variables='{"cta":"Theo dõi để xem bản tin mới mỗi ngày","channel":"AI Coding","source":"Nguồn: https://aicodingvn.vercel.app/"}'
        >
            <div class="sheet"></div>
            <div class="rule-top"></div>
            <div class="cta"></div>
            <div class="channel"></div>
            <div class="source"></div>
            <div class="rule-bot"></div>
        </div>
        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".cta", v.cta);
                set(".channel", v.channel);
                set(".source", v.source);
            })();
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function () {},
                paused: function () {
                    return true;
                },
            };
        </script>
    </body>
</html>
