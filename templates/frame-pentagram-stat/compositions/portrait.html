<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1080, height=1920" />
        <title>Pentagram Stat · Portrait 9:16</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            /* frame-pentagram-stat — PORTRAIT 9:16 (1080×1920). See NOTICE for attribution. */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1080px;
                height: 1920px;
                overflow: hidden;
                background: #0a0c12;
            }
            #root {
                position: relative;
                width: 1080px;
                height: 1920px;
                background:
                    radial-gradient(
                        120% 80% at 86% 6%,
                        rgba(56, 130, 246, 0.22) 0%,
                        transparent 52%
                    ),
                    #0a0c12;
                color: #e8edf5;
                font-family: "Archivo", "Helvetica Neue", Arial, sans-serif;
            }

            .rule-h,
            .rule-v {
                position: absolute;
                background: #ffffff;
            }
            .rule-h {
                left: 80px;
                right: 80px;
                height: 1px;
                opacity: 0;
                transform-origin: left center;
                animation: ruleH 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            .rule-v {
                top: 0;
                bottom: 0;
                width: 1px;
                opacity: 0;
                transform-origin: top center;
                animation: ruleV 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            @keyframes ruleH {
                0% {
                    opacity: 0;
                    transform: scaleX(0);
                }
                100% {
                    opacity: 0.06;
                    transform: scaleX(1);
                }
            }
            @keyframes ruleV {
                0% {
                    opacity: 0;
                    transform: scaleY(0);
                }
                100% {
                    opacity: 0.04;
                    transform: scaleY(1);
                }
            }

            .type-anchor {
                position: absolute;
                right: -120px;
                top: 46%;
                font-weight: 900;
                font-size: 820px;
                line-height: 0.82;
                color: #38bdf8;
                opacity: 0;
                z-index: 0;
                user-select: none;
                letter-spacing: -24px;
                transform: translateY(-46%);
                animation: anchorRise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s
                    forwards;
            }
            @keyframes anchorRise {
                0% {
                    opacity: 0;
                    transform: translateY(-38%);
                }
                100% {
                    opacity: 0.1;
                    transform: translateY(-50%);
                }
            }

            .content {
                position: absolute;
                left: 80px;
                right: 80px;
                top: 320px;
                z-index: 2;
            }
            .label {
                font-size: 24px;
                font-weight: 700;
                letter-spacing: 5px;
                text-transform: uppercase;
                color: #38bdf8;
                text-shadow: 0 0 22px rgba(56, 189, 248, 0.55);
                margin-bottom: 30px;
                opacity: 0;
                animation: fadeUp 0.6s ease-out 0.7s forwards;
            }
            .headline {
                font-weight: 900;
                font-size: 300px;
                line-height: 0.88;
                letter-spacing: -10px;
                background: linear-gradient(135deg, #ff5757 0%, #8c52ff 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                filter: drop-shadow(0 0 50px rgba(255, 87, 87, 0.4))
                    drop-shadow(0 0 20px rgba(140, 82, 255, 0.3));
                opacity: 0;
                animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.85s
                    forwards;
            }
            .subtitle {
                font-size: 36px;
                font-weight: 500;
                color: #94a3b8;
                letter-spacing: 0.5px;
                margin-top: 48px;
                max-width: 900px;
                line-height: 1.4;
                opacity: 0;
                animation: fadeUp 0.7s ease-out 1.15s forwards;
            }
            @keyframes fadeUp {
                0% {
                    opacity: 0;
                    transform: translateY(24px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .center-rule {
                position: absolute;
                left: 80px;
                top: 1000px;
                width: 0;
                height: 5px;
                background: #38bdf8;
                box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
                z-index: 2;
                animation: ruleGrow 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.3s
                    forwards;
            }
            @keyframes ruleGrow {
                0% {
                    width: 0;
                }
                100% {
                    width: 360px;
                }
            }

            .bars {
                position: absolute;
                left: 80px;
                bottom: 260px;
                display: flex;
                gap: 26px;
                align-items: flex-end;
                height: 320px;
                z-index: 2;
            }
            .bar {
                width: 88px;
                background: #ffffff;
                opacity: 0.1;
                transform: scaleY(0);
                transform-origin: bottom;
                animation: barGrow 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            .bar.red {
                background: #38bdf8;
                opacity: 0.9;
                box-shadow: 0 0 26px rgba(56, 189, 248, 0.5);
            }
            @keyframes barGrow {
                0% {
                    transform: scaleY(0);
                }
                100% {
                    transform: scaleY(1);
                }
            }

            .bottom-bar {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 100px;
                background: #0f1320;
                border-top: 1px solid rgba(56, 189, 248, 0.4);
                z-index: 3;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 80px;
                transform: translateY(100%);
                animation: barUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.5s
                    forwards;
            }
            @keyframes barUp {
                0% {
                    transform: translateY(100%);
                }
                100% {
                    transform: translateY(0);
                }
            }
            .bottom-left {
                font-size: 26px;
                font-weight: 700;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: #fff;
                opacity: 0.85;
            }
            .bottom-right {
                font-size: 20px;
                font-weight: 700;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: #fff;
                opacity: 0.4;
            }

            #fireworks {
                position: absolute;
                inset: 0;
                z-index: 6;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1080"
            data-height="1920"
            data-composition-variables='{"label":"Hiệu Năng · Coding","headline":"82%","subtitle":"Điểm SWE-bench cao nhất trong các mô hình mã nguồn mở.","anchor":"82","footer_left":"AI Coding","footer_right":"https://aicodingvn.vercel.app/"}'
        >
            <canvas id="fireworks" width="1080" height="1920"></canvas>

            <div class="rule-h" style="top: 320px"></div>
            <div
                class="rule-h"
                style="top: 1000px; animation-delay: 0.1s"
            ></div>
            <div class="rule-v" style="left: 80px"></div>
            <div
                class="rule-v"
                style="left: 540px; animation-delay: 0.1s"
            ></div>
            <div
                class="rule-v"
                style="right: 80px; animation-delay: 0.15s"
            ></div>

            <div class="type-anchor"></div>

            <div class="content">
                <div class="label"></div>
                <div class="headline"></div>
                <div class="subtitle"></div>
            </div>

            <div class="center-rule"></div>

            <div class="bars">
                <div
                    class="bar"
                    style="height: 55%; animation-delay: 1.35s"
                ></div>
                <div
                    class="bar"
                    style="height: 70%; animation-delay: 1.42s"
                ></div>
                <div
                    class="bar red"
                    style="height: 100%; animation-delay: 1.5s"
                ></div>
                <div
                    class="bar"
                    style="height: 48%; animation-delay: 1.58s"
                ></div>
                <div
                    class="bar"
                    style="height: 62%; animation-delay: 1.66s"
                ></div>
            </div>

            <div class="bottom-bar">
                <div class="bottom-left"></div>
                <div class="bottom-right"></div>
            </div>
        </div>

        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".label", v.label);
                set(".headline", v.headline);
                set(".subtitle", v.subtitle);
                set(".type-anchor", v.anchor);
                set(".bottom-left", v.footer_left);
                set(".bottom-right", v.footer_right);

                /* Auto-scale headline to fit container width */
                function fitText(el, maxPx, minPx) {
                    if (!el || !el.textContent.trim()) return;
                    el.style.whiteSpace = "nowrap";
                    el.style.fontSize = maxPx + "px";
                    var avail = el.parentElement ? el.parentElement.clientWidth : 9999;
                    if (el.scrollWidth > avail) {
                        var sized = Math.max(minPx || 60, Math.floor(maxPx * avail / el.scrollWidth));
                        el.style.fontSize = sized + "px";
                    }
                    el.style.whiteSpace = "";
                }
                fitText(document.querySelector(".headline"), 300, 80);
            })();
            /* ── Fireworks — HyperFrames-synced ── */
            var _fwMs = 0;

            (function () {
                var canvas = document.getElementById("fireworks");
                if (!canvas) return;
                var ctx = canvas.getContext("2d");
                var W = 1080, H = 1920;

                var PALETTE = ["#ff5757","#ff9a3d","#8c52ff","#38bdf8","#ffde59","#ff57d8","#ffffff"];

                /* Define 4 burst origins + their trigger time (ms) */
                var BURSTS = [
                    { x: 220,  y: 480,  t0: 80,  n: 28, spd: 7.5 },
                    { x: 860,  y: 320,  t0: 280, n: 24, spd: 6.5 },
                    { x: 540,  y: 880,  t0: 520, n: 32, spd: 8.0 },
                    { x: 160,  y: 1200, t0: 760, n: 20, spd: 6.0 },
                ];

                /* Pre-generate particles per burst (random but deterministic via seed-like Math) */
                var bursts = BURSTS.map(function (b, bi) {
                    var parts = [];
                    for (var i = 0; i < b.n; i++) {
                        var angle = (i / b.n) * Math.PI * 2 + (bi * 0.37);
                        var spd = b.spd * (0.55 + 0.45 * Math.abs(Math.sin(i * 2.1 + bi)));
                        parts.push({
                            vx: Math.cos(angle) * spd,
                            vy: Math.sin(angle) * spd,
                            r:  1.8 + 2.2 * Math.abs(Math.cos(i * 1.7)),
                            color: PALETTE[(i + bi * 3) % PALETTE.length],
                        });
                    }
                    return { x: b.x, y: b.y, t0: b.t0, parts: parts };
                });

                /* lifetime of each burst in ms */
                var LIFE = 900;
                var GRAVITY = 0.003; /* px / ms^2 */

                function drawAt(tMs) {
                    ctx.clearRect(0, 0, W, H);
                    bursts.forEach(function (b) {
                        var age = tMs - b.t0;       /* ms since this burst fired */
                        if (age < 0 || age > LIFE) return;
                        var progress = age / LIFE;  /* 0 → 1 */
                        var alpha = Math.max(0, 1 - progress * progress);

                        b.parts.forEach(function (p) {
                            /* position: x = vx * age, y = vy * age + ½g*age² */
                            var px = b.x + p.vx * age;
                            var py = b.y + p.vy * age + 0.5 * GRAVITY * age * age;
                            var radius = p.r * (1 - progress * 0.4);

                            ctx.globalAlpha = alpha * 0.9;
                            ctx.fillStyle = p.color;
                            ctx.shadowColor = p.color;
                            ctx.shadowBlur = 6;
                            ctx.beginPath();
                            ctx.arc(px, py, radius, 0, Math.PI * 2);
                            ctx.fill();

                            /* small trailing dot */
                            if (progress < 0.6) {
                                ctx.globalAlpha = alpha * 0.4;
                                ctx.beginPath();
                                ctx.arc(px - p.vx * 18, py - p.vy * 18, radius * 0.5, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        });
                    });
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }

                window._drawFireworks = drawAt;
                (function loop() { drawAt(_fwMs); requestAnimationFrame(loop); })();
            })();

            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function (t) {
                    _fwMs = (t || 0) * 1000;
                    if (window._drawFireworks) window._drawFireworks(_fwMs);
                },
                paused: function () { return true; },
            };
        </script>
    </body>
</html>
