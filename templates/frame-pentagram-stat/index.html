<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1920, height=1080" />
        <title>Pentagram Stat · Swiss Grid Data Anchor</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            /*
   * frame-pentagram-stat — Swiss-grid statistic anchor. Vendored from
   * nexu-io/html-video (Apache-2.0) and adapted to HyperFrames 0.6: content
   * wrapped in #root, sample copy replaced with data-composition-variables.
   * Archivo already covers Vietnamese, so the type stack is unchanged.
   * See NOTICE for attribution. 16:9; 9:16 lives at compositions/portrait.html.
   */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1920px;
                height: 1080px;
                overflow: hidden;
                background: #0a0c12;
            }
            #root {
                position: relative;
                width: 1920px;
                height: 1080px;
                background:
                    radial-gradient(
                        90% 120% at 90% 4%,
                        rgba(56, 130, 246, 0.22) 0%,
                        transparent 50%
                    ),
                    #0a0c12;
                color: #e8edf5;
                font-family: "Archivo", "Helvetica Neue", Arial, sans-serif;
            }

            .rule-h,
            .rule-v {
                position: absolute;
                background: #ffffff;
            }
            .rule-h {
                left: 96px;
                right: 96px;
                height: 1px;
                opacity: 0;
                transform-origin: left center;
                animation: ruleH 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            .rule-v {
                top: 0;
                bottom: 0;
                width: 1px;
                opacity: 0;
                transform-origin: top center;
                animation: ruleV 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            @keyframes ruleH {
                0% {
                    opacity: 0;
                    transform: scaleX(0);
                }
                100% {
                    opacity: 0.06;
                    transform: scaleX(1);
                }
            }
            @keyframes ruleV {
                0% {
                    opacity: 0;
                    transform: scaleY(0);
                }
                100% {
                    opacity: 0.04;
                    transform: scaleY(1);
                }
            }

            .type-anchor {
                position: absolute;
                right: -90px;
                top: 50%;
                font-weight: 900;
                font-size: 1020px;
                line-height: 0.82;
                color: #38bdf8;
                opacity: 0;
                z-index: 0;
                user-select: none;
                letter-spacing: -30px;
                transform: translateY(-46%);
                animation: anchorRise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s
                    forwards;
            }
            @keyframes anchorRise {
                0% {
                    opacity: 0;
                    transform: translateY(-38%);
                }
                100% {
                    opacity: 0.1;
                    transform: translateY(-50%);
                }
            }

            .content {
                position: absolute;
                left: 96px;
                top: 130px;
                z-index: 2;
                max-width: 1180px;
            }
            .label {
                font-size: 18px;
                font-weight: 700;
                letter-spacing: 6px;
                text-transform: uppercase;
                color: #38bdf8;
                text-shadow: 0 0 22px rgba(56, 189, 248, 0.55);
                margin-bottom: 28px;
                opacity: 0;
                animation: fadeUp 0.6s ease-out 0.7s forwards;
            }
            .headline {
                font-weight: 900;
                font-size: 230px;
                line-height: 0.9;
                letter-spacing: -8px;
                color: #ff9a3d;
                text-shadow:
                    0 0 60px rgba(255, 154, 61, 0.45),
                    0 0 18px rgba(255, 154, 61, 0.35);
                opacity: 0;
                animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.85s
                    forwards;
            }
            .subtitle {
                font-size: 26px;
                font-weight: 500;
                color: #94a3b8;
                letter-spacing: 0.5px;
                margin-top: 40px;
                max-width: 820px;
                opacity: 0;
                animation: fadeUp 0.7s ease-out 1.15s forwards;
            }
            @keyframes fadeUp {
                0% {
                    opacity: 0;
                    transform: translateY(24px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .center-rule {
                position: absolute;
                left: 96px;
                top: 600px;
                width: 0;
                height: 5px;
                background: #38bdf8;
                box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
                z-index: 2;
                animation: ruleGrow 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.3s
                    forwards;
            }
            @keyframes ruleGrow {
                0% {
                    width: 0;
                }
                100% {
                    width: 400px;
                }
            }

            .bars {
                position: absolute;
                left: 96px;
                bottom: 150px;
                display: flex;
                gap: 22px;
                align-items: flex-end;
                height: 280px;
                z-index: 2;
            }
            .bar {
                width: 64px;
                background: #ffffff;
                opacity: 0.1;
                transform: scaleY(0);
                transform-origin: bottom;
                animation: barGrow 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            .bar.red {
                background: #38bdf8;
                opacity: 0.9;
                box-shadow: 0 0 26px rgba(56, 189, 248, 0.5);
            }
            @keyframes barGrow {
                0% {
                    transform: scaleY(0);
                }
                100% {
                    transform: scaleY(1);
                }
            }

            .bottom-bar {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 80px;
                background: #0f1320;
                border-top: 1px solid rgba(56, 189, 248, 0.4);
                z-index: 3;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 96px;
                transform: translateY(100%);
                animation: barUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.5s
                    forwards;
            }
            @keyframes barUp {
                0% {
                    transform: translateY(100%);
                }
                100% {
                    transform: translateY(0);
                }
            }
            .bottom-left {
                font-size: 18px;
                font-weight: 700;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: #fff;
                opacity: 0.85;
            }
            .bottom-right {
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: #fff;
                opacity: 0.4;
            }

            @media (prefers-reduced-motion: reduce) {
                * {
                    animation: none !important;
                }
                .rule-h {
                    opacity: 0.06;
                }
                .rule-v {
                    opacity: 0.04;
                }
                .type-anchor {
                    opacity: 0.07;
                }
                .label,
                .headline,
                .subtitle {
                    opacity: 1;
                }
                .center-rule {
                    width: 400px;
                }
                .bar {
                    transform: scaleY(1);
                }
                .bottom-bar {
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1920"
            data-height="1080"
            data-composition-variables='{"label":"Hiệu Năng · Coding","headline":"82%","subtitle":"Điểm SWE-bench cao nhất trong các mô hình mã nguồn mở.","anchor":"82","footer_left":"AI Coding","footer_right":"https://aicodingvn.vercel.app/"}'
        >
            <div class="rule-h" style="top: 130px"></div>
            <div class="rule-h" style="top: 600px; animation-delay: 0.1s"></div>
            <div class="rule-v" style="left: 96px"></div>
            <div
                class="rule-v"
                style="left: 960px; animation-delay: 0.1s"
            ></div>
            <div
                class="rule-v"
                style="right: 96px; animation-delay: 0.15s"
            ></div>

            <div class="type-anchor"></div>

            <div class="content">
                <div class="label"></div>
                <div class="headline"></div>
                <div class="subtitle"></div>
            </div>

            <div class="center-rule"></div>

            <div class="bars">
                <div
                    class="bar"
                    style="height: 55%; animation-delay: 1.35s"
                ></div>
                <div
                    class="bar"
                    style="height: 70%; animation-delay: 1.42s"
                ></div>
                <div
                    class="bar red"
                    style="height: 100%; animation-delay: 1.5s"
                ></div>
                <div
                    class="bar"
                    style="height: 48%; animation-delay: 1.58s"
                ></div>
                <div
                    class="bar"
                    style="height: 62%; animation-delay: 1.66s"
                ></div>
            </div>

            <div class="bottom-bar">
                <div class="bottom-left"></div>
                <div class="bottom-right"></div>
            </div>
        </div>

        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".label", v.label);
                set(".headline", v.headline);
                set(".subtitle", v.subtitle);
                set(".type-anchor", v.anchor);
                set(".bottom-left", v.footer_left);
                set(".bottom-right", v.footer_right);

                /* Auto-scale headline to fit container width */
                function fitText(el, maxPx, minPx) {
                    if (!el || !el.textContent.trim()) return;
                    el.style.whiteSpace = "nowrap";
                    el.style.fontSize = maxPx + "px";
                    var avail = el.parentElement ? el.parentElement.clientWidth : 9999;
                    if (el.scrollWidth > avail) {
                        var sized = Math.max(minPx || 60, Math.floor(maxPx * avail / el.scrollWidth));
                        el.style.fontSize = sized + "px";
                    }
                    el.style.whiteSpace = "";
                }
                fitText(document.querySelector(".headline"), 230, 60);
            })();
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function () {},
                paused: function () {
                    return true;
                },
            };
        </script>
    </body>
</html>
